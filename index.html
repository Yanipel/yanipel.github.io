    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Yanipel",
        "url": "https://yanipel.github.io/",
        "description": "Agence web AI-first à La Réunion spécialisée en création de sites internet, e-commerce, applications mobiles et automatisations IA.",

          "name": "La Réunion"
        },

          "Création de site internet",
          "Création de site e-commerce",
          "Développement d'application mobile",
          "Automatisation IA",
          "Intégration n8n"
        ],

          "https://lepic974.github.io/",
          "https://yanipay.github.io/"
        ]
      }
    </script>
    <script>
      ;(() => {
        const host = window.location.hostname
        const isLocal = host === 'localhost' || host === '127.0.0.1'
        if (isLocal) return
        const checkAndRedirect = () => {
          const alreadyInDocs = window.location.pathname.startsWith('/docs/')
          const hasSourceEntry = Boolean(document.querySelector('script[src="/src/main.tsx"]'))
          if (!alreadyInDocs && hasSourceEntry) {
            window.location.replace('/docs/')
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', checkAndRedirect, { once: true })
          return
        }
        checkAndRedirect()
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
