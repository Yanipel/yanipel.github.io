    <script>
      ;(() => {
        const host = window.location.hostname
        const isLocal = host === 'localhost' || host === '127.0.0.1'
        if (isLocal) return
        const checkAndRedirect = () => {
          const alreadyInDocs = window.location.pathname.startsWith('/docs/')
          const hasSourceEntry = Boolean(document.querySelector('script[src="/src/main.tsx"]'))
          if (!alreadyInDocs && hasSourceEntry) {
            window.location.replace('/docs/')
          }
        }
        if (document.readyState === 'loading') {
          document.addEventListener('DOMContentLoaded', checkAndRedirect, { once: true })
          return
        }
        checkAndRedirect()
      })()
    </script>
